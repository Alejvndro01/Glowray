[[mods]]
modId="glowray"
# CAMBIO: En Modrinth y en tu descripción pusiste 1.0.0, aquí debe decir lo mismo
version="1.0.0"
    # El nombre público que todos verán en el menú de mods
    displayName="Glowray" 
    # Tu nombre como autor principal
    authors="Alejvndro01" 
    # Una descripción mucho más épica y profesional
    description='''
    Glowray sumerge tu mundo de Minecraft en una experiencia mística, 
    introduciendo criaturas bioluminiscentes únicas y reliquias perdidas. 
    Explora los ecosistemas acuáticos y descubre los secretos que aguardan 
    bajo el suave resplandor de la naturaleza.
    '''
    # CAMBIO: Quita el '#' para que el link aparezca en el menú de mods de Minecraft
    displayTestUrl="https://github.com/Alejvndro01/Glowray" 
    # Un mensaje que aparece en la lista de mods
    credits="Gracias a la comunidad de Glowray por el apoyo en el desarrollo."

